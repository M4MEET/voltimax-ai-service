version: "3.8"

services:
  voltimax-ai:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env:ro
      - ./knowledge_files:/app/knowledge_files
      - ./static/forms:/app/static/forms
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - voltimax

  mongo:
    image: mongodb/mongodb-atlas-local:latest
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    restart: unless-stopped
    networks:
      - voltimax
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in .env}
      - WEBHOOK_URL=http://localhost:5678
      - VOLTIMAX_AI_URL=http://host.docker.internal:8000
      - VOLTIMAX_API_KEY=${VOLTIMAX_DASHBOARD_KEY:?Set VOLTIMAX_DASHBOARD_KEY in .env}
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_DIAGNOSTICS_ENABLED=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows
    restart: unless-stopped
    networks:
      - voltimax

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/?directConnection=true
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:?Set MONGO_EXPRESS_PASSWORD in .env}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - voltimax

networks:
  voltimax:
    driver: bridge

# All data stored in ./data/ via bind mounts for easy backup
